services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doktors_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - mysql
    networks:
      - doktors_network

  nginx:
    image: nginx:alpine
    container_name: doktors_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - doktors_network

  mysql:
    image: mysql:8.0
    container_name: doktors_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: doktors
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: doktors_user
      MYSQL_PASSWORD: doktors_pass
    ports:
      - "3307:3306"
    volumes:
      - doktors_mysql_data:/var/lib/mysql
    networks:
      - doktors_network

networks:
  doktors_network:

volumes:
  doktors_mysql_data:
