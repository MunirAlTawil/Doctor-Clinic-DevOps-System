stages:
  - test

variables:
  APP_ENV: testing
  APP_DEBUG: "true"
  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: 3306
  DB_DATABASE: doktors_test
  DB_USERNAME: doktors_user
  DB_PASSWORD: doktors_pass
  MYSQL_DATABASE: doktors_test
  MYSQL_ROOT_PASSWORD: root
  MYSQL_USER: doktors_user
  MYSQL_PASSWORD: doktors_pass
  MYSQL_ROOT_HOST: "%"
  COMPOSER_ALLOW_SUPERUSER: "1"

test:
  stage: test
  image: php:8.2

  services:
    - name: mysql:8.0
      alias: mysql

  before_script:
    - apt-get update && apt-get install -y git unzip curl default-mysql-client libzip-dev libpng-dev libicu-dev libonig-dev libxml2-dev
    - curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
    - apt-get install -y nodejs
    - docker-php-ext-install pdo pdo_mysql mbstring bcmath intl zip
    - curl -sS https://getcomposer.org/installer | php
    - mv composer.phar /usr/local/bin/composer
    - cp .env.example .env
    - mkdir -p storage/framework/cache storage/framework/sessions storage/framework/views bootstrap/cache
    - chmod -R 777 storage bootstrap/cache
    - composer install --no-interaction --prefer-dist --optimize-autoloader
    - npm ci
    - npm run build
    - php artisan key:generate
    - echo "DB_CONNECTION=mysql" >> .env
    - echo "DB_HOST=mysql" >> .env
    - echo "DB_PORT=3306" >> .env
    - echo "DB_DATABASE=doktors_test" >> .env
    - echo "DB_USERNAME=doktors_user" >> .env
    - echo "DB_PASSWORD=doktors_pass" >> .env
    - for i in $(seq 1 60); do mysqladmin ping --ssl-mode=DISABLED -h"$DB_HOST" -u"$DB_USERNAME" -p"$DB_PASSWORD" --silent && break; echo "Waiting for MySQL... ($i/60)"; sleep 2; done
    - mysql --ssl-mode=DISABLED -h"$DB_HOST" -u"$DB_USERNAME" -p"$DB_PASSWORD" -e "SELECT 1;"
    - php artisan migrate --force
    - php artisan optimize:clear

  script:
    - php artisan test