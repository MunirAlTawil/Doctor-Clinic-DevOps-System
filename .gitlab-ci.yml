stages:
  - validate
  - build
  - test
  - package
  - deploy

variables:
  APP_ENV: testing
  APP_DEBUG: "true"
  DB_CONNECTION: sqlite
  DB_DATABASE: database/database.sqlite
  COMPOSER_ALLOW_SUPERUSER: "1"

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - vendor/
    - node_modules/

php_syntax:
  stage: validate
  image: php:8.2
  before_script:
    - apt-get update && apt-get install -y git unzip curl
    - curl -sS https://getcomposer.org/installer | php
    - mv composer.phar /usr/local/bin/composer
    - composer install --no-interaction --prefer-dist --optimize-autoloader
  script:
    - find app config database routes resources/views tests -name "*.php" -print0 | xargs -0 -n1 php -l

build_frontend:
  stage: build
  image: node:20
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - public/build/
    expire_in: 1 week

test_application:
  stage: test
  image: php:8.2
  needs:
    - build_frontend
  before_script:
    - apt-get update && apt-get install -y git unzip curl libzip-dev libpng-dev libicu-dev libonig-dev libxml2-dev libsqlite3-dev sqlite3
    - docker-php-ext-install pdo pdo_sqlite mbstring bcmath intl zip
    - curl -sS https://getcomposer.org/installer | php
    - mv composer.phar /usr/local/bin/composer
    - cp .env.example .env
    - mkdir -p storage/framework/cache storage/framework/sessions storage/framework/views bootstrap/cache database
    - chmod -R 777 storage bootstrap/cache database
    - touch database/database.sqlite
    - composer install --no-interaction --prefer-dist --optimize-autoloader
    - php artisan key:generate
    - php artisan migrate --force
    - php artisan optimize:clear
  script:
    - php artisan test
  artifacts:
    when: always
    paths:
      - public/build/
    expire_in: 1 week

package_project:
  stage: package
  image: alpine:latest
  needs:
    - build_frontend
    - test_application
  script:
    - mkdir -p release
    - cp -r app bootstrap config database docker k8s public resources routes scripts storage terraform tests release/
    - cp .dockerignore .gitignore artisan composer.json composer.lock DEVOPS-IMPLEMENTATION.md docker-compose.yml Dockerfile monitoring-plan.md package.json package-lock.json phpunit.xml postcss.config.js README.md tailwind.config.js vite.config.js .gitlab-ci.yml release/ 2>/dev/null || true
    - tar -czf doctor-clinic-devops-system.tar.gz release
    - echo "Project package created successfully"
  artifacts:
    paths:
      - doctor-clinic-devops-system.tar.gz
    expire_in: 1 week

docker_build:
  stage: package
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  needs:
    - test_application
  before_script: []
  script:
    - echo "Docker image build stage prepared"
    - echo "Add registry credentials later to enable real image push"
    - /kaniko/executor --context "${CI_PROJECT_DIR}" --dockerfile "${CI_PROJECT_DIR}/Dockerfile" --no-push
  only:
    - main
  allow_failure: true

deploy_placeholder:
  stage: deploy
  image: alpine:latest
  needs:
    - package_project
  script:
    - echo "Deployment stage placeholder"
    - echo "Future target: Docker registry / Kubernetes / VM deployment"
  only:
    - main