stages:
  - test

variables:
  APP_ENV: testing
  APP_DEBUG: "true"
  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: 3306
  DB_DATABASE: doktors_test
  DB_USERNAME: doktors_user
  DB_PASSWORD: doktors_pass

test:
  stage: test
  image: php:8.2

  services:
    - name: mysql:8.0
      alias: mysql

  before_script:
    - apt-get update && apt-get install -y git unzip curl libzip-dev libpng-dev libicu-dev libonig-dev nodejs npm default-mysql-client
    - docker-php-ext-install pdo pdo_mysql mbstring bcmath intl
    - curl -sS https://getcomposer.org/installer | php
    - php composer.phar install --no-interaction --prefer-dist --optimize-autoloader
    - npm install
    - npm run build
    - cp .env.example .env
    - php artisan key:generate
    - echo "DB_CONNECTION=mysql" >> .env
    - echo "DB_HOST=mysql" >> .env
    - echo "DB_PORT=3306" >> .env
    - echo "DB_DATABASE=doktors_test" >> .env
    - echo "DB_USERNAME=doktors_user" >> .env
    - echo "DB_PASSWORD=doktors_pass" >> .env
    - php artisan migrate --force
    - php artisan optimize:clear

  script:
    - php artisan test
