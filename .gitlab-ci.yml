stages:
  - validate
  - build
  - test
  - package
  - deploy

variables:
  APP_ENV: testing
  APP_DEBUG: "true"
  DB_CONNECTION: sqlite
  DB_DATABASE: database/database.sqlite
  COMPOSER_ALLOW_SUPERUSER: "1"
  NODE_ENV: production

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - vendor/
    - node_modules/

php_syntax:
  stage: validate
  image: php:8.2-cli
  before_script:
    - apt-get update && apt-get install -y git unzip curl
    - curl -sS https://getcomposer.org/installer | php
    - mv composer.phar /usr/local/bin/composer
    - composer install --no-interaction --prefer-dist --optimize-autoloader
  script:
    - find app config database routes tests -name "*.php" -print0 | xargs -0 -n1 php -l

build_frontend:
  stage: build
  image: node:20
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - public/build
    expire_in: 1 week

test_application:
  stage: test
  image: php:8.2-cli
  needs:
    - build_frontend
  before_script:
    - apt-get update && apt-get install -y git unzip curl libzip-dev libpng-dev libicu-dev libonig-dev libxml2-dev libsqlite3-dev sqlite3
    - docker-php-ext-install pdo pdo_sqlite mbstring bcmath intl zip
    - curl -sS https://getcomposer.org/installer | php
    - mv composer.phar /usr/local/bin/composer
    - cp .env.example .env
    - mkdir -p storage/framework/cache storage/framework/sessions storage/framework/views bootstrap/cache database
    - touch database/database.sqlite
    - chmod -R 777 storage bootstrap/cache database
    - composer install --no-interaction --prefer-dist --optimize-autoloader
    - php artisan key:generate
    - php artisan migrate --force
    - php artisan optimize:clear
  script:
    - php artisan test
  artifacts:
    when: always
    paths:
      - storage/logs
    expire_in: 1 week

package_project:
  stage: package
  image: alpine:latest
  needs:
    - build_frontend
    - test_application
  script:
    - mkdir -p package
    - cp -r app bootstrap config database docker k8s public resources routes scripts storage terraform tests package/ || true
    - cp .env.example artisan composer.json composer.lock package.json package-lock.json phpunit.xml vite.config.js Dockerfile docker-compose.yml monitoring-plan.md DEVOPS-IMPLEMENTATION.md README.md .dockerignore package/ || true
    - tar -czf doctor-clinic-devops-package.tar.gz package
  artifacts:
    paths:
      - doctor-clinic-devops-package.tar.gz
    expire_in: 1 week

docker_build:
  stage: package
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  needs:
    - test_application
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"username\":\"$CI_REGISTRY_USER\",\"password\":\"$CI_REGISTRY_PASSWORD\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor --context "$CI_PROJECT_DIR" --dockerfile "$CI_PROJECT_DIR/Dockerfile" --destination "$CI_REGISTRY_IMAGE:latest" --destination "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
  only:
    - main

deploy_placeholder:
  stage: deploy
  image: alpine:latest
  needs:
    - package_project
  script:
    - echo "Deployment stage placeholder"
    - echo 'Future target: Docker registry / Kubernetes / VM deployment'
  only:
    - main