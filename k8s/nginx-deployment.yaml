apiVersion: apps/v1
kind: Deployment
metadata:
  name: doctor-clinic-nginx
  namespace: doctor-clinic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: doctor-clinic-nginx
  template:
    metadata:
      labels:
        app: doctor-clinic-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config-volume
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-config-volume
          configMap:
            name: nginx-config
